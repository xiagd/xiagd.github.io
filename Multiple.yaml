proxy-groups:
- name: 节点选择
  type: select
  proxies:
  - 负载均衡_Quick
  - 自动选择_Quick
  - 手动选择_Quick
  - 负载均衡_Go  
  - 自动选择_Go 
  - 手动选择_Go
  - 负载均衡_QuickGo
  - 自动选择_QuickGo
  - 手动选择_QuickGo
  - DIRECT
  
 #=======================================
- name: 负载均衡_Quick
  type: load-balance             # 必须指定类型
  url: https://www.gstatic.com/generate_204  # 节点测试地址
  interval: 300                  # 节点延迟测试间隔（单位：秒）
  #strategy: round-robin          # 负载策略（轮询）
  strategy: consistent-hashing      # 负载策略（一致性哈希，相同目标IP/域名固定使用同一节点）
  timeout:  2000   #xxx ms
  tolerance: 100
  max-failed-times: 3             # 连续失败3次标记节点不可用
  health-check:
     enable: true
     url: http://www.gstatic.com/generate_204
     interval: 180          # *s检查高优先级组是否恢复
     tolerance: 100
     timeout:  2000   # 超时2秒视为不可用
     max-failed-times: 3             # 连续失败3次标记节点不可用
     lazy: true             # true :检测当前被策略组使用的节点,  false:检测所有节点
  proxies:
  #- ss1自建节点
  #- vm+ws自建节点
  use: *quick-providers # 使用统一的节点变量 (使用别名)
   
#=======================================
- name: 自动选择_Quick
  type: url-test 
  url: http://www.gstatic.com/generate_204
  interval: 300   #秒
  tolerance: 50    #控制切换灵敏度ms
  timeout:  2000 
  lazy: true 
  health-check:
     enable: true
     url: http://www.gstatic.com/generate_204
     interval: 120          # x秒检查高优先级组是否恢复
     tolerance: 50
     timeout:  2000   # 超时x秒视为不可用
     #expected-status: 204
     max-failed-times: 3             # 连续失败3次标记节点不可用
     lazy: true             # true :检测当前被策略组使用的节点,  false:检测所有节点
  proxies:
  #- ss1自建节点
  #- vm+ws自建节点
  use: *quick-providers # 使用统一的节点变量 (使用别名)


#=======================================  
- name: 手动选择_Quick
  type: select
  url: http://www.gstatic.com/generate_204
  interval: 300
  timeout:  2000 
  tolerance: 50
  lazy: true 
  health-check:
     enable: true
     url: http://www.gstatic.com/generate_204
     interval: 100          # 300s检查高优先级组是否恢复
     tolerance: 200
     timeout:  2000   # 超时xxx ms视为不可用
     lazy: true             # true :检测当前被策略组使用的节点,  false:检测所有节点
  #proxies:
  #- ss1自建节点
  #- vm+ws自建节点
  use: *quick-providers # 使用统一的节点变量 (使用别名)  

