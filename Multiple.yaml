- name: 手动选择_QuickGo
  type: select
  url: http://www.gstatic.com/generate_204
  interval: 300
  timeout:  2000 
  tolerance: 50
  lazy: true 
  health-check:
     enable: true
     url: http://www.gstatic.com/generate_204
     interval: 100          # 300s检查高优先级组是否恢复
     tolerance: 200
     timeout:  2000   # 超时xxx ms视为不可用
